<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бүтээгдэхүүний каталог — Medicont</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sticky Nav -->
  <nav class="sticky-nav" id="stickyNav">
    <img src="medicont/images/medicontlogo.png" alt="Medicont" class="logo-img" />
  </nav>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-label">Эмнэлгийн хэрэгсэл</div>
      <h1 class="header-title">Бүтээгдэхүүний<br><em>каталог</em></h1>
      <p class="header-sub">Нүдний мэс засал болон оношилгооны чиглэлийн тэргүүлэх бүтээгдэхүүнүүд</p>
    </div>
  </header>

  <!-- Controls: search + filter -->
  <div class="controls-bar">
    <div class="controls-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input class="search-input" id="searchInput" type="search" placeholder="Бүтээгдэхүүн хайх..." autocomplete="off" />
      </div>
      <div class="filter-tabs" id="filterTabs"></div>
    </div>
  </div>

  <!-- Cards grid -->
  <main class="main">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="20" x2="28" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="empty-title">Бүтээгдэхүүн олдсонгүй</div>
      <div class="empty-sub">Өөр хайлтын үг эсвэл ангилал сонгоно уу</div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Хаах">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    const nav = document.getElementById('stickyNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
