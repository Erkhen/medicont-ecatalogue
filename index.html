<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Бүтээгдэхүүний каталог — Medicont</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script>
    // Theme горимыг хуудас render-ийн өмнө шууд тогтооно (flash-ээс сэргийлнэ)
    (function() {
      const saved = localStorage.getItem('medicont_theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sticky Nav -->
  <nav class="sticky-nav" id="stickyNav">
    <img src="medicont/images/medicontlogo.png" alt="Medicont" class="logo-img" />
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Өнгөний горим солих">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.2" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="1.3" x2="8" y2="2.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="8" y1="13.3" x2="8" y2="14.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="1.3" y1="8" x2="2.7" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="13.3" y1="8" x2="14.7" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="3.3" y1="3.3" x2="4.2" y2="4.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="11.8" y1="11.8" x2="12.7" y2="12.7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="3.3" y1="12.7" x2="4.2" y2="11.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="11.8" y1="4.2" x2="12.7" y2="3.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 9.5A6 6 0 1 1 6.5 2.5a5 5 0 0 0 7 7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      </button>
      <!-- Mobile: хайх товч -->
      <button class="nav-search-btn" id="openDrawer" aria-label="Хайх, шүүх">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Хайх
      </button>
    </div>
  </nav>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-label">Эмнэлгийн хэрэгсэл</div>
      <h1 class="header-title">Бүтээгдэхүүний<br><em>каталог</em></h1>
    </div>
  </header>

  <!-- Desktop: Controls bar -->
  <div class="controls-bar" id="controlsBar">
    <div class="controls-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input class="search-input" id="searchInput" type="search" placeholder="Бүтээгдэхүүн хайх..." autocomplete="off" />
      </div>
      <div class="filter-tabs" id="filterTabs"></div>
    </div>
  </div>

  <!-- Cards grid -->
  <main class="main">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="20" x2="28" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="empty-title">Бүтээгдэхүүн олдсонгүй</div>
      <div class="empty-sub">Өөр хайлтын үг эсвэл ангилал сонгоно уу</div>
    </div>
  </main>

  <!-- Product modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Хаах">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- Mobile drawer: хайлт + ангилал -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer" role="dialog" aria-modal="true" aria-label="Хайлт ба ангилал">
    <div class="drawer-handle"></div>
    <div class="drawer-top-row">
      <div class="drawer-section-title" style="margin-bottom:0;">Хайлт</div>
      <button class="drawer-close-btn" id="drawerCloseBtn" aria-label="Хаах">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><line x1="2" y1="2" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="2" x2="2" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="drawer-search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <input type="search" id="drawerSearchInput" placeholder="Бүтээгдэхүүн хайх..." autocomplete="off" />
    </div>
    <div class="drawer-section-title">Ангилал</div>
    <div class="drawer-cats" id="drawerCats"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    const nav = document.getElementById('stickyNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
